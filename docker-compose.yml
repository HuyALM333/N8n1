services:
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=209.97.165.66
      - N8N_PROTOCOL=http
      - N8N_PORT=5678
      - WEBHOOK_URL=http://209.97.165.66:5678/
      - GENERIC_TIMEZONE=Asia/Ho_Chi_Minh
      - N8N_SECURE_COOKIE=false
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=DoiMatKhauManh123
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
    volumes:
      - n8n-data:/home/node/.n8n
    networks: 
      - bcts-network
    restart: unless-stopped

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - bcts-network
    restart: unless-stopped

  redis-2:
    image: redis:7
    ports:
      - "6380:6379"
    volumes:
      - redis2-data:/data
    networks:
      - bcts-network
    restart: unless-stopped

  weaver-api:
    build: ./weaver-api
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - NINE_ROUTER_URL=http://9router:20128
      - NINE_ROUTER_API_KEY=${NINE_ROUTER_API_KEY:-}
      - NINE_ROUTER_MODEL=gpt-4o-mini
    depends_on:
      - redis
    networks:
      - bcts-network
    restart: unless-stopped

  9router:
    image: decolua/9router
    ports:
      - "20128:20128"
    networks:
      - bcts-network
    restart: unless-stopped

  discord-bot:
    build: ./discord-bot
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - N8N_WEBHOOK=http://n8n:5678/webhook/discord
    depends_on:
      - n8n
    networks:
      - bcts-network
    restart: unless-stopped

networks:
  bcts-network:
    driver: bridge

volumes:
  redis-data:
  redis2-data:
  n8n-data: